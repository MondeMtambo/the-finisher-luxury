<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="THE FINISHER LUXURY CRM - Professional CRM solution for luxury business management">
  <meta name="theme-color" content="#FFD700">
  <meta name="msapplication-TileColor" content="#FFD700">
  <!-- Fallback for browsers that don't support theme-color -->
  <meta name="msapplication-navbutton-color" content="#FFD700">
  <!-- Additional fallbacks for better cross-browser support -->
  <meta name="format-detection" content="telephone=no">
  <style>
    /* CSS fallback for browsers without theme-color support */
    :root {
      --theme-color: #D4AF37;
      
      /* LUXURY THEME VARIABLES - GLOBAL OVERRIDE */
      --primary: #D4AF37;
      --primary-hover: #B49015;
      --primary-500: #D4AF37;
      --primary-600: #B49015;
      --primary-700: #997A00;
      
      /* Obsidian Dark Mode */
      --gray-900: #0B0C10;
      --gray-800: #111418;
      --gray-700: #1A1D24;
      --gray-600: #374151;
      --gray-500: #6b7280;
      --gray-400: #9ca3af;
      --gray-300: #d1d5db;
      
      /* UI Elements */
      --card-bg: rgba(17, 20, 24, 0.85);
      --border: rgba(212, 175, 55, 0.2);
      --border-color: rgba(212, 175, 55, 0.2);
    }

    html, body, #app {
      background-color: #0B0C10 !important; /* Force Obsidian Black globally */
      color: #ffffff !important;
      margin: 0;
      min-height: 100vh;
    }

    /* =========================================
       CONCEPT 4: THE KINETIC EDGE (LUXURY NAV)
       ========================================= */
    /* The Sidebar Canvas */
    .sidebar {
      background-color: #0B0C10 !important;
      border-right: 1px solid rgba(212, 175, 55, 0.15) !important;
    }

    /* Sleek, borderless nav items with sharp edges */
    .nav-item {
      position: relative !important;
      background: transparent !important;
      border: none !important;
      border-radius: 0 !important;
      color: #9ca3af !important;
      transition: all 0.3s ease !important;
      overflow: hidden !important;
      z-index: 1 !important;
    }

    /* Laser-thin golden border drawing effect */
    .nav-item::before, .nav-item::after {
      content: '' !important;
      position: absolute !important;
      width: 0 !important;
      height: 1px !important;
      background: #D4AF37 !important;
      transition: width 0.4s cubic-bezier(0.19, 1, 0.22, 1) !important;
      z-index: -1 !important;
    }
    .nav-item::before { top: 0 !important; left: 0 !important; }
    .nav-item::after { bottom: 0 !important; right: 0 !important; }

    /* Hover State - Triggers the laser draw */
    .nav-item:hover {
      color: #fff !important;
      background: rgba(212, 175, 55, 0.02) !important;
    }
    .nav-item:hover::before, .nav-item:hover::after {
      width: 100% !important;
    }

    /* Active Tab - Ambient Metallic Aura */
    .nav-item.active {
      color: #D4AF37 !important;
      background: rgba(212, 175, 55, 0.05) !important;
      box-shadow: inset 3px 0 0 #D4AF37, inset 0 0 20px rgba(212, 175, 55, 0.1) !important;
      text-shadow: 0 0 8px rgba(212, 175, 55, 0.4) !important;
    }
    .nav-item.active svg {
      stroke: #D4AF37 !important;
      filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5)) !important;
    }

    /* Absolute Global Eradication of Old Light UI */
    .card, .modal-panel, .stat-card, .table-card, .auth-card {
      background-color: rgba(17, 20, 24, 0.85) !important;
      border: 1px solid rgba(212, 175, 55, 0.2) !important;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 0 15px rgba(212,175,55,0.05) !important;
      color: #ffffff !important;
    }
    .data-table th, .data-table td { border-bottom-color: rgba(255,255,255,0.05) !important; color: #fff !important; }
    .data-table th { background: rgba(0,0,0,0.4) !important; color: #D4AF37 !important; text-transform: uppercase; }
    .form-input { background-color: rgba(0,0,0,0.2) !important; color: #fff !important; border-color: rgba(255,255,255,0.1) !important; }
    .form-input:focus { border-color: #D4AF37 !important; box-shadow: 0 0 0 3px rgba(212,175,55,0.2) !important; }
  </style>
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="application-name" content="Finisher CRM">
  <meta name="msapplication-tooltip" content="THE FINISHER LUXURY CRM">
  <meta name="msapplication-navbutton-color" content="#FFD700">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finisher CRM">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>THE FINISHER LUXURY CRM</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
