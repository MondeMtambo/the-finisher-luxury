<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="THE FINISHER LUXURY CRM - Professional CRM solution for luxury business management">
  <meta name="theme-color" content="#FFD700">
  <meta name="msapplication-TileColor" content="#FFD700">
  <!-- Fallback for browsers that don't support theme-color -->
  <meta name="msapplication-navbutton-color" content="#FFD700">
  <!-- Additional fallbacks for better cross-browser support -->
  <meta name="format-detection" content="telephone=no">
  <style>
    /* CSS fallback for browsers without theme-color support */
    :root {
      --theme-color: #D4AF37;
      
      /* LUXURY THEME VARIABLES - GLOBAL OVERRIDE */
      --primary: #D4AF37;
      --primary-hover: #B49015;
      --primary-500: #D4AF37;
      --primary-600: #B49015;
      --primary-700: #997A00;
      
      /* Obsidian Dark Mode */
      --gray-900: #0B0C10;
      --gray-800: #111418;
      --gray-700: #1A1D24;
      --gray-600: #374151;
      --gray-500: #6b7280;
      --gray-400: #9ca3af;
      --gray-300: #d1d5db;
      
      /* UI Elements */
      --card-bg: rgba(17, 20, 24, 0.85);
      --border: rgba(212, 175, 55, 0.2);
      --border-color: rgba(212, 175, 55, 0.2);
    }

    html, body, #app {
      background-color: #000000 !important; /* Absolute Zero Canvas */
      color: #ffffff !important;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* =========================================
       CONCEPT 3: THE CINEMATIC SPOTLIGHT
       ========================================= */
    
    /* The Global Spotlight Overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(212, 175, 55, 0.08), transparent 40%);
      pointer-events: none;
      z-index: 9998;
    }

    /* Reactive, Shadowed UI Canvas */
    .card, .modal-panel, .stat-card, .table-card, .auth-card {
      background-color: rgba(10, 10, 10, 0.6) !important;
      border: 1px solid rgba(255, 255, 255, 0.03) !important;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important;
      color: #9ca3af !important;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1) !important;
      backdrop-filter: blur(10px);
    }
    
    /* Spotlight Hover State - Cards illuminate when the light hits them */
    .card:hover, .modal-panel:hover, .stat-card:hover, .table-card:hover, .auth-card:hover {
      border-color: rgba(212, 175, 55, 0.3) !important;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.1), inset 0 0 15px rgba(212, 175, 55, 0.05) !important;
      color: #ffffff !important;
      transform: translateY(-2px);
    }

    /* Golden Shockwave Click Effect */
    .golden-shockwave {
      position: fixed;
      width: 20px; height: 20px;
      border: 2px solid rgba(212, 175, 55, 0.8);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(1);
      animation: shockwave 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
      pointer-events: none;
      z-index: 10000;
    }
    @keyframes shockwave {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; box-shadow: 0 0 15px rgba(212, 175, 55, 0.8); }
      100% { transform: translate(-50%, -50%) scale(15); opacity: 0; border-width: 0px; }
    }

    /* Nav & Form Controls */
    .sidebar { background-color: #000000 !important; border-right: 1px solid rgba(255,255,255,0.02) !important; }
    .nav-item { color: #4b5563 !important; transition: all 0.4s ease !important; }
    .nav-item:hover, .nav-item.active { color: #D4AF37 !important; text-shadow: 0 0 10px rgba(212,175,55,0.3) !important; background: transparent !important; }
    .data-table th, .data-table td { border-bottom-color: rgba(255,255,255,0.02) !important; color: inherit !important; transition: color 0.3s; }
    .data-table th { background: transparent !important; color: #D4AF37 !important; text-transform: uppercase; letter-spacing: 2px; }
    .form-input { background-color: rgba(0,0,0,0.4) !important; color: #fff !important; border-color: rgba(255,255,255,0.05) !important; }
    .form-input:focus { border-color: #D4AF37 !important; box-shadow: 0 0 15px rgba(212,175,55,0.1) !important; }

    /* =========================================
       VIP NOTIFICATION POP-UPS & KINETICS
       ========================================= */
    /* System Toast Notifications */
    .toast-container {
      position: fixed !important;
      top: 24px !important;
      right: 24px !important;
      z-index: 100000 !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 12px !important;
      pointer-events: none !important;
    }
    .toast {
      pointer-events: auto !important;
      background: rgba(15, 15, 15, 0.95) !important;
      backdrop-filter: blur(15px) !important;
      border-left: 4px solid #D4AF37 !important;
      border-top: 1px solid rgba(212, 175, 55, 0.2) !important;
      border-right: 1px solid rgba(212, 175, 55, 0.2) !important;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2) !important;
      box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 20px rgba(212,175,55,0.15) !important;
      color: #fff !important;
      padding: 16px 24px !important;
      border-radius: 8px !important;
      min-width: 320px !important;
      animation: slideInRight 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards !important;
    }
    .toast-success { border-left-color: #22c55e !important; }
    .toast-error { border-left-color: #ef4444 !important; }
    .toast-warning { border-left-color: #f59e0b !important; }
    .toast-info { border-left-color: #3b82f6 !important; }

    @keyframes slideInRight {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Topbar Notification Dropdowns & Modals */
    .notif-dropdown, .user-dropdown {
      background: rgba(15, 15, 15, 0.95) !important;
      backdrop-filter: blur(15px) !important;
      border: 1px solid rgba(212, 175, 55, 0.3) !important;
      box-shadow: 0 20px 40px rgba(0,0,0,0.9), inset 0 0 15px rgba(212, 175, 55, 0.05) !important;
      color: #fff !important;
      animation: popDown 0.4s cubic-bezier(0.19, 1, 0.22, 1) forwards !important;
      transform-origin: top right;
    }
    .notif-item:hover, .dropdown-item:hover { background: rgba(212, 175, 55, 0.1) !important; }
    
    .modal-panel {
      animation: popUp 0.4s cubic-bezier(0.19, 1, 0.22, 1) forwards !important;
    }

    @keyframes popDown {
      from { transform: scale(0.95) translateY(-10px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes popUp {
      from { transform: scale(0.95) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
  </style>

</head>
<body>
  <div id="app"></div>
  <script>
    // 1. The Spotlight Engine
    document.addEventListener('mousemove', e => {
      document.documentElement.style.setProperty('--mouse-x', e.clientX + 'px');
      document.documentElement.style.setProperty('--mouse-y', e.clientY + 'px');
    });

    // 2. The Golden Shockwave Engine
    document.addEventListener('mousedown', e => {
      const isActionable = e.target.closest('button, a, .card, .stat-card, .nav-item, select, input, .deal-card');
      if (isActionable) {
        const ripple = document.createElement('div');
        ripple.className = 'golden-shockwave';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 800);
      }
    });
  </script>
</body>
</html>
